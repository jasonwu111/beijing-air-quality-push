name: Beijing AQI Push

on:
  schedule:
    # 北京时间每天 06:43 运行 (对应 UTC 22:43)
    - cron: "43 22 * * *"
  workflow_dispatch:

jobs:
  run-script:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests

      - name: Run script
        env:
          AQICN_TOKEN: ${{ secrets.AQICN_TOKEN }}
          SENDKEYS: ${{ secrets.SENDKEYS }}
        run: python air_quality_api_new.py

  
